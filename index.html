    <style type="text/tailwindcss">
      @layer base {
        body {
          font-family: 'Inter', sans-serif;
          @apply bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased transition-colors duration-300;
        }
      }
      .mesh-gradient {
        background-image: radial-gradient(at 0% 0%, rgba(19, 91, 236, 0.15) 0px, transparent 50%),
                          radial-gradient(at 100% 100%, rgba(19, 91, 236, 0.1) 0px, transparent 50%);
      }
      .timeline-line::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        @apply bg-slate-200 dark:bg-slate-border;
      }

      @media print {
        header, footer, aside, .no-print, button {
          display: none !important;
        }
        body {
          background: white !important;
          color: black !important;
          padding: 0 !important;
        }
        .mesh-gradient {
          background: none !important;
        }
        main {
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        .lg\:col-span-8 {
          grid-column: span 12 / span 12 !important;
        }
        .max-w-6xl {
          max-width: 100% !important;
        }
        section {
          page-break-inside: avoid;
        }
        /* Restore contrast for print */
        .text-slate-500, .text-slate-400 {
          color: #4a5568 !important;
        }
        .text-primary {
          color: #135bec !important;
          -webkit-print-color-adjust: exact;
        }
        .bg-primary {
          background-color: #135bec !important;
          -webkit-print-color-adjust: exact;
        }
        .bg-slate-50, .bg-slate-100 {
          background-color: #f7fafc !important;
          border: 1px solid #edf2f7 !important;
        }
        .rounded-3xl, .rounded-[2.5rem] {
          border-radius: 12px !important;
        }
        .border-slate-border, .border-slate-200 {
          border-color: #e2e8f0 !important;
        }
      }
    </style>
